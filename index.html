    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* 상단 네비게이션 */
    .top-nav{

    /* --- 컨텐츠 --- */
    .work-unit{
      width: 732px;
      margin: 150px auto 0;
      opacity: 0;
      transition: opacity 0.3s ease-out;
      justify-content: center;
    }

    .work-unit.reveal-visible{ opacity: 1; }

    .work-inner{
      display: inline-block;
      margin: 0 auto;
    }

    img.work{
      display: block;
      max-width: 100%;
      max-height: 530px;
      width: auto;
      height: auto;
      filter: grayscale(100%);
      transition: filter 0.8s ease;
    }

    .work-unit:hover img.work{ filter: grayscale(0%); }

    figcaption{
      position: static;
      display: block;
      text-align: left;
    }

    .des{
      margin-top: 10px;
      font-family: 'Life','Italic';
      color: #000;
    }

    .date{
      margin-top: 4px;
      font-family: 'Life','Regular';
      color: grey;
    }

    .work-inner.window-only{ display:block; width:100%; }
    .work-inner.window-only .media-center{ display:flex; justify-content:center; }
    .work-inner.window-only figcaption{ text-align:left; }

    /* =========================
       ✅ ABOUT OVERLAY (왼쪽 블록)
       ========================= */
    .about-overlay{
      position: fixed;
      inset: 0;
      z-index: 1500;
      pointer-events: none;
    }

    /* 배경은 거의 변화 없음(원하면 아주 살짝만) */
    .about-overlay .dim{
      position:absolute;
      inset:0;
      background: rgba(255,255,255,0);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    /* 왼쪽 정보 블록 */
    .about-overlay .panel{
      position: absolute;
      left: 20px;
      top: 82px; /* 네비 아래 */
      width: 210px;

      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .about-overlay.is-open{
      pointer-events: auto;
    }
    .about-overlay.is-open .dim{
      opacity: 1;
    }
    .about-overlay.is-open .panel{
      opacity: 1;
      transform: translateY(0);
    }

    .about-portrait{
      width: 86px;     /* 스크린샷처럼 작게 */
      height: 110px;   /* ID 느낌 */
      object-fit: cover;
      display:block;
      margin-bottom: 18px;
      filter: contrast(1.02) saturate(0.98);
    }

    .about-info{
      font-family: 'Life','Regular';
      font-size: 14px;
      line-height: 1.55;
      color: #000;
    }

    .about-info a{
      color: #000;
      text-decoration: none;
    }
    .about-info a:hover{ opacity: 0.6; }

    /* 닫기: 바깥 클릭/ESC 가능 + X는 숨겨도 되고 */
    .about-close{
      position:absolute;
      right:0;
      top:-34px;
      border:0;
      background:transparent;
      font-family:'Life','Regular';
      font-size: 20px;
      cursor:pointer;
      line-height:1;
      opacity:0.7;
    }
    .about-close:hover{ opacity:1; }

    /* 모바일: 패널 조금 아래로 */
    @media (max-width: 520px){
      .about-overlay .panel{ left: 16px; top: 78px; }
    }
body.about-open .work-unit{
  filter: blur(2px);

  transition: filter 0.3s ease, opacity 0.3s ease;

.work-unit{

  </style>

  <!-- --- JS --- -->
  <script>
    // fade-in
    window.addEventListener('DOMContentLoaded', () => {
      const units = document.querySelectorAll('.work-unit');

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('reveal-visible');
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.3 });

      units.forEach(unit => observer.observe(unit));
    });

    // About overlay
    const aboutBtn = document.getElementById('aboutBtn');
    const aboutOverlay = document.getElementById('aboutOverlay');
    const aboutDim = document.getElementById('aboutDim');
    const aboutClose = document.getElementById('aboutClose');

    function openAbout(){
  aboutOverlay.classList.add('is-open');
  document.body.classList.add('about-open');
  aboutOverlay.setAttribute('aria-hidden', 'false');
}

function closeAbout(){
  aboutOverlay.classList.remove('is-open');
  document.body.classList.remove('about-open');
  aboutOverlay.setAttribute('aria-hidden', 'true');
}

   aboutBtn.addEventListener('click', (e) => {
  e.preventDefault();

  if (aboutOverlay.classList.contains('is-open')){
    closeAbout();
  } else {
    openAbout();
  }
});

    aboutDim.addEventListener('click', closeAbout);
    aboutClose.addEventListener('click', closeAbout);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && aboutOverlay.classList.contains('is-open')) {
        closeAbout();
      }
    });

    // Overview 버튼은 그냥 닫기처럼(원하면 다른 기능 연결 가능)
    document.getElementById('overviewBtn').addEventListener('click', (e) => {
      e.preventDefault();
      closeAbout();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
