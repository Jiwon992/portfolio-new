   .top-nav{

    .work-unit{

    .work-unit.reveal-visible{ opacity: 1; }

    .work-inner.window-only figcaption{ text-align:left; }

    body.overlay-open .page{

      opacity: 0.6;

.work-unit:last-of-type{
  margin-bottom: 10px;
}
.page{
  transition: filter 0.3s ease, opacity 0.3s ease;

@media (hover: none) and (pointer: coarse) {

  <script>
window.addEventListener('DOMContentLoaded', () => {
  /* fade-in */
  const units = document.querySelectorAll('.work-unit');

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('reveal-visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });

  units.forEach(unit => observer.observe(unit));

  
});
</script>
