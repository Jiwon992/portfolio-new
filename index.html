* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
    * { box-sizing: border-box; }

    /* 상단 네비게이션 */
    .top-nav{
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      padding: 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      font-family: 'Life','Regular';
      font-size: 20px;
    }

    .nav-right{
      display: flex;
      gap: 20px;
    }

    .nav-right a{
      text-decoration: none;
      white-space: nowrap;
    }

    /* --- 컨텐츠 --- */
    .work-unit{
  width: 732px;
  margin: 150px auto 0;
  opacity: 0;
  transition: opacity 0.3s ease-out;
  justify-content: center;
}
    

    .work-unit.reveal-visible{
      opacity: 1;
    }

    /* ✅ 이미지 폭 기준으로 캡션 정렬용 래퍼 */
    .work-inner{
      display: inline-block;   /* 내부 폭 = 이미지 폭 */
      margin: 0 auto;          /* figure 안에서 가운데 */
    }

    /* ✅ 모든 이미지: 비율 유지 + 높이 통일 */
    img.work{
      display: block;
      max-width: 100%;
      max-height: 530px;       /* <- 여기만 바꾸면 전체 통일 높이 조절 */
      width: auto;
      height: auto;

      filter: grayscale(100%);
      transition: filter 0.8s ease;
    }

    .work-unit:hover img.work{
      filter: grayscale(0%);
    }

    /* 캡션: 이제 absolute 없이 자연스럽게 아래로 */
    figcaption{
      position: static;
      display: block;
      text-align: left;
    }

    .des{
      margin-top: 10px;
      font-family: 'Life','Italic';
    }

    .date{
      margin-top: 4px;
      font-family: 'Life','Regular';
      color: grey;
    }

    /* (옵션) window만 더 작게 하고 싶으면 사용
    img.work.is-small{
      max-height: 420px;
    }
    */

    /* ---- video 기존 코드 유지 ---- */

/* ✅ window: 이미지(미디어)만 가운데, 캡션은 다른 작품처럼 왼쪽 그대로 */
.work-inner.window-only{
  display: block;
  width: 100%;
}

.work-inner.window-only .media-center{
  display: flex;
  justify-content: center; /* 이미지만 가운데 */
}

.work-inner.window-only figcaption{
  text-align: left;        /* 캡션은 왼쪽 유지 */
}
  </style>

<body>

  <!-- --- JS: fade-in만 남김 (캡션 위치 계산 삭제) --- -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const units = document.querySelectorAll('.work-unit');

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('reveal-visible');
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.3 });

      units.forEach(unit => observer.observe(unit));
    });
  </script>
