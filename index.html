<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jiwonkm</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

  <style>
    @font-face {
      font-family: 'Life';
      src: url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Regular.ttf?v=124420307790299199351770164188');
      src: url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Regular.eot?%23iefix&v=163054127475779477521770164188') format('embedded-opentype'),
           url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Regular.woff?v=66292042991132316961770164188') format('woff'),
           url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Regular.woff2?v=97767031032572429991770164188') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Life';
      src: url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Italic.ttf?v=162763466313126598491770164188');
      src: url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Italic.eot?%23iefix&v=36830789672214481861770164188') format('embedded-opentype'),
           url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Italic.woff?v=164715903325973277161770164188') format('woff'),
           url('//in-other-words.co.uk/cdn/shop/t/11/assets/LifeEF-Italic.woff2?v=157444114806194521391770164188') format('woff2');
      font-weight: normal;
      font-style: italic;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body{
      font-family: 'Life','Regular';
      background: #fff;
      color: #000;
    }

   .top-nav{
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  padding: 20px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 2000;
  font-family: 'Life','Regular';
  font-size: 20px;
  background: white;
}

    .nav-right{
      display: flex;
      gap: 20px;
    }

    .nav-right a{
      text-decoration: none;
      white-space: nowrap;
      color: black;
    }

    .page{
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    .work-unit{
      width: 732px;
      margin: 150px auto 0;
      opacity: 0;
      transition: opacity 0.3s ease-out, filter 0.3s ease;
      justify-content: center;
    }

    .work-unit.reveal-visible{ opacity: 1; }

    .work-inner{
      display: inline-block;
      margin: 0 auto;
    }

    img.work{
      display: block;
      max-width: 100%;
      max-height: 530px;
      width: auto;
      height: auto;
      filter: grayscale(100%);
      transition: filter 0.8s ease;
    }

    .work-unit:hover img.work{ filter: grayscale(0%); }

    figcaption{
      position: static;
      display: block;
      text-align: left;
    }

    .des{
      margin-top: 10px;
      font-family: 'Life','Italic';
      color: #000;
    }

    .date{
      margin-top: 4px;
      font-family: 'Life','Regular';
      color: grey;
    }

    .work-inner.window-only{ display:block; width:100%; }
    .work-inner.window-only .media-center{ display:flex; justify-content:center; }
    .work-inner.window-only figcaption{ text-align:left; }

    body.overlay-open .page{
      filter: blur(2px);
      opacity: 0.6;
    }

    .about-overlay,
    .overview-overlay{
      position: fixed;
      inset: 0;
      z-index: 1500;
      pointer-events: none;
    }

    .about-overlay .dim,
    .overview-overlay .dim{
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .about-overlay .panel{
      position: absolute;
      left: 20px;
      top: 82px;
      width: 210px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .about-overlay.is-open,
    .overview-overlay.is-open{
      pointer-events: auto;
    }

    .about-overlay.is-open .dim,
    .overview-overlay.is-open .dim{
      opacity: 1;
    }
.overview-overlay{
  pointer-events:none;
}

.overview-overlay.is-open{
  pointer-events:auto;
}

    .about-portrait{
      width: 86px;
      height: 110px;
      object-fit: cover;
      display:block;
      margin-bottom: 18px;
      filter: contrast(1.02) saturate(0.98);
    }

    .about-info{
      font-family: 'Life','Regular';
      font-size: 14px;
      line-height: 1.55;
      color: #000;
    }

    .about-info a{
      color: #000;
      text-decoration: none;
    }

    .about-info a:hover{ opacity: 0.6; }

    /* ===== OVERVIEW ===== */
    .overview-overlay .panel{
      position: absolute;
      inset: 0;
      padding: 66px 0 20px 20px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .overview-overlay.is-open .panel{
      opacity: 1;
      transform: translateY(0);
    }

    .overview-layout{
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
      height: 100%;
    }

    .overview-list{
      padding-top: 2px;
    }

    .overview-link{
      display: inline-block;
      font-size: 14px;
      line-height: 1.45;
      color: black;
      text-decoration: underline;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .overview-link:hover{
      opacity: 0.65;
    }

   .overview-preview{
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding-right: 20px;
}

    .overview-preview img{
  width:220px;
  position:absolute;

}
.about-overlay.is-open .panel{
  opacity: 1;
  transform: translateY(0);
}

    .overview-caption{
     display: none;}
    .overview-caption .cap-title{
      font-family: 'Life','Italic';
      font-size: 14px;
      color: #000;
    }

    .overview-caption .cap-date{
      font-size: 14px;
      color: grey;
      margin-top: 4px;
    }

    @media (max-width: 980px){
      .overview-layout{
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .overview-preview{
        padding-top: 0;
        padding-right: 0;
        align-items: flex-start;
      }

      .overview-preview img{
        max-width: 100%;
        width: 100%;
      }

      .overview-caption{
        width: 100%;
        max-width: 100%;
      }
    }

    @media (max-width: 520px){
      .about-overlay .panel{ left: 16px; top: 78px; }
      .overview-overlay .panel{ padding: 72px 16px 16px 16px; }
    }
  </style>
</head>

<body>

  <header class="top-nav">
    <div class="nav-left">Jiwon Kim</div>
    <div class="nav-right">
      <a href="#" id="aboutBtn">About</a>
      <a href="#" id="overviewBtn">Overview</a>
    </div>
  </header>

  <div class="page">
    <figure class="work-unit">
      <div class="work-inner">
        <a href="fake-news.html">
          <img src="PU5A92361-11-min.png" class="work">
        </a>
        <figcaption class="des">Fake news on facebook</figcaption>
        <figcaption class="date">publication, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="foilage.html">
          <img src="foliagebigimage.png" class="work">
        </a>
        <figcaption class="des">Foliege</figcaption>
        <figcaption class="date">photo series, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="the lovers.html">
          <img src="12-2.jpg" class="work">
        </a>
        <figcaption class="des">The Lovers</figcaption>
        <figcaption class="date">publication, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="perspective transition.html">
          <img src="7M4A2297-2-3.jpg" class="work">
        </a>
        <figcaption class="des">Perspective Transition</figcaption>
        <figcaption class="date">publication, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="Graphic scores.html">
          <img src="Untitled-1-10-min.png" class="work">
        </a>
        <figcaption class="des">Graphic Scores in the Library</figcaption>
        <figcaption class="date">publication, 2024</figcaption>
      </div>
    </figure>
    <figure class="work-unit">
      <div class="work-inner window-only">
        <div class="media-center">
          <a href="window.html">
            <img src="IMG_7321-4.jpg" class="work" alt="window still">
          </a>
        </div>
        <figcaption class="des">Raining</figcaption>
        <figcaption class="date">Installation, 2025</figcaption>
      </div>
    </figure>
  </div>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="video.html">
          <img src="IMG_7359-3-2-2.jpg" class="work">
        </a>
        <figcaption class="des">Navigation</figcaption>
        <figcaption class="date">video, 2025</figcaption>
      </div>
    </figure>

     <figure class="work-unit">
      <div class="work-inner window-only">
        <div class="media-center">
          <a href="meditation.html">
            <img src="meditation2.jpeg" class="work" alt="window still">
          </a>
        </div>
        <figcaption class="des">Meditation</figcaption>
        <figcaption class="date">video, 2025</figcaption>
      </div>
    </figure>
  </div>


  <script>
window.addEventListener('DOMContentLoaded', () => {
  /* fade-in */
  const units = document.querySelectorAll('.work-unit');

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('reveal-visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });

  units.forEach(unit => observer.observe(unit));

  /* elements */
  const aboutBtn = document.getElementById('aboutBtn');
  const aboutOverlay = document.getElementById('aboutOverlay');
  const aboutDim = document.getElementById('aboutDim');

  const overviewBtn = document.getElementById('overviewBtn');
  const overviewOverlay = document.getElementById('overviewOverlay');
  const overviewDim = document.getElementById('overviewDim');
  const overviewPanel = overviewOverlay.querySelector('.panel');

  const previewImage = document.getElementById('overviewPreviewImage');
  const previewTitle = document.getElementById('overviewPreviewTitle');
  const previewDate = document.getElementById('overviewPreviewDate');
  const overviewLinks = document.querySelectorAll('.overview-link');

  /* overview default preview */
  const defaultPreview = {
    image: 'PU5A92361-11-min.png',
    title: 'Fake news on facebook',
    date: 'publication, 2025'
  };

  function setPreview(image, title, date) {
    previewImage.src = image;
    previewTitle.textContent = title;
    previewDate.textContent = date;
  }

  function resetPreview() {
    setPreview(defaultPreview.image, defaultPreview.title, defaultPreview.date);
  }

  function updateBodyState() {
    const isAnyOpen =
      aboutOverlay.classList.contains('is-open') ||
      overviewOverlay.classList.contains('is-open');

    document.body.classList.toggle('overlay-open', isAnyOpen);
  }

  function openAbout() {
    closeOverview();
    aboutOverlay.classList.add('is-open');
    updateBodyState();
  }

  function closeAbout() {
    aboutOverlay.classList.remove('is-open');
    updateBodyState();
  }

  function openOverview() {
    closeAbout();
    overviewOverlay.classList.add('is-open');
    resetPreview();
    updateBodyState();
  }

  function closeOverview() {
    overviewOverlay.classList.remove('is-open');
    resetPreview();
    updateBodyState();
  }

  /* button toggle */
  aboutBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();

    if (aboutOverlay.classList.contains('is-open')) {
      closeAbout();
    } else {
      openAbout();
    }
  });

  overviewBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();

    if (overviewOverlay.classList.contains('is-open')) {
      closeOverview();
    } else {
      openOverview();
    }
  });

  /* about: outside click close */
  aboutDim.addEventListener('click', closeAbout);

  /* overview: anywhere click close (except project links) */
  overviewOverlay.addEventListener('click', (e) => {
    if (e.target.closest('.overview-link')) return;
    closeOverview();
  });

  /* panel 안에서도 링크 아닌 곳 클릭하면 닫힘 */
  overviewPanel.addEventListener('click', (e) => {
    if (e.target.closest('.overview-link')) return;
    closeOverview();
  });

  /* ESC close */
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeAbout();
      closeOverview();
    }
  });

  /* overview hover preview */
  overviewLinks.forEach(link => {
    link.addEventListener('mouseenter', () => {
      setPreview(
        link.dataset.image,
        link.dataset.title,
        link.dataset.date
      );
    });
  });
});
</script>

</body>
</html>
