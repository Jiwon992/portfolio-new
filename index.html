<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jiwonkm</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

  <style>
  @font-face {
    font-family: "Newfont";
    src: url(./font/Bodoni-72.ttc#0) format("truetype");
    font-style: normal;
    font-weight: 500;
  }

  @font-face {
    font-family: "Newfont1";
    src: url(./font/Garamond-Book-Regular.ttf) format("truetype");
    font-style: normal;
    font-weight: 500;
  }

  @font-face {
    font-family: "Newfont3";
    src: url(./font/Garamond.ttf) format("truetype");
    font-style: normal;
    font-weight: 500;
  }

  @font-face {
    font-family: "Newfont4";
    src: url(./font/CenturyExpandedRegular.ttf) format("truetype");
    font-style: normal;
    font-weight: 500;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .top-nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 20px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000;
    font-family: 'Newfont4';
    font-size: 23px;
  }

  .nav-left{
    position: relative;
    z-index: 2;
  }

  .nav-right{
    display: flex;
    gap: 20px;
    position: relative;
    z-index: 2;
    font-size: 23px;
  }

  .nav-right a{
    text-decoration: none;
    white-space: nowrap;
    color: black;
    font-size: 23px;
  }

  .click-note{
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Newfont4';
    font-size: 20px;
    color: blue;
    line-height: 1.1;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.35s ease;
    z-index: 1;
    pointer-events: none;
  }

  .click-note.show{
    opacity: 1;
  }

  .click-note.hide{
    opacity: 0;
  }

  .page{
    transition: filter 0.3s ease, opacity 0.3s ease;
    padding-bottom: 50px;
  }

  .work-unit{
    width: 732px;
    margin: 150px auto 0;
    opacity: 0;
    transition: opacity 0.3s ease-out, filter 0.3s ease;
    justify-content: center;
  }

  .work-unit.reveal-visible{
    opacity: 1;
  }

  .work-inner{
    display: inline-block;
    margin: 0 auto;
  }

  .first-work-wrap{
    width: 732px;
    margin: 150px auto 0;
    position: relative;
  }

  .first-work-unit{
    width: 100%;
    margin: 0;
  }

  img.work{
    display: block;
    max-width: 100%;
    max-height: 530px;
    width: auto;
    height: auto;
    filter: grayscale(100%);
    transition: filter 0.8s ease;
  }

  .work-unit:hover img.work{
    filter: grayscale(0%);
  }

  figcaption{
    position: static;
    display: block;
    text-align: left;
    line-height: 1.1;
  }

  .des{
    font-family: 'Newfont4';
    color: #000;
    font-size: 16px;
    margin-top: 10px;
  }

  .date{
    margin-top: 6px;
    font-family: 'Newfont4';
    color: grey;
  }

  .work-inner.window-only{
    display:block;
    width:100%;
  }

  .work-inner.window-only .media-center{
    display:flex;
    justify-content:center;
  }

  .work-inner.window-only figcaption{
    text-align:left;
  }

  body.overlay-open .page{
    filter: blur(2px);
    opacity: 0.6;
  }

  .work-unit:last-of-type{
    margin-bottom: 10px;
  }
 @media (hover: none) and (pointer: coarse) {
    img.work {
      filter: grayscale(0%);
    }
 @media (max-width:800px){

  .top-nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 20px 18px 0 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000;
    font-family: 'Newfont4';
    font-size: 20px;
  }

  .nav-left{
    position: relative;
    z-index: 2;
    font-size: 20px;
    line-height: 1;
  }

  .nav-right{
    display: flex;
    gap: 16px;
    position: relative;
    z-index: 2;
    font-size: 20px;
    line-height: 1;
  }

  .nav-right a{
    text-decoration: none;
    white-space: nowrap;
    color: black;
    font-size: 20px;
    line-height: 1;
  }

  .click-note{
    display: none;
  }

  .page{
    padding: 0 18px 40px 18px;
  }

  .work-unit{
    width: 100%;
    margin: 28px 0 0 0;
    padding: 0;
  }

  .first-work-wrap{
    width: 100%;
    margin: 72px 0 0 0;
  }

  .first-work-unit{
    width: 100%;
    margin: 0;
  }

  .work-inner{
    width: 100%;
    display: block;
  }

  .work-inner.window-only{
    display: block;
    width: 100%;
  }

  .work-inner.window-only .media-center{
    display: block;
    width: 100%;
  }

  .work-inner.window-only .media-center a{
    display: block;
    width: 100%;
  }

  img.work{
    display: block;
    width: 100%;
    height: auto;
    max-width: none;
    max-height: none;
    filter: none;
  }

  figcaption{
    display: block;
    text-align: left;
    padding: 8px 0 0 0;
    line-height: 1.1;
  }

  .des{
    font-family: 'Newfont4';
    color: #000;
    font-size: 16px;
    margin-top: 8px;
  }

  .date{
    margin-top: 3px;
    font-family: 'Newfont4';
    color: grey;
    font-size: 16px;
  }
}
  </style>
</head>

<body>

  <header class="top-nav">
    <div class="nav-left">Jiwon Kim</div>
    <div class="click-note" id="clickNote">click images to view more</div>
    <div class="nav-right">
      <a href="index.html">Works</a>
      <a href="about.html">About</a>
    </div>
  </header>

  <div class="page">
    <!-- foliage를 첫 번째 프로젝트로 배치 -->
    <div class="first-work-wrap">
      <figure class="work-unit first-work-unit">
        <div class="work-inner">
          <a href="foilage.html">
            <img src="foliagebigimage.png" class="work first-work-image" alt="foilage">
          </a>
          <figcaption class="des">foliage</figcaption>
          <figcaption class="date">publication, 2025</figcaption>
        </div>
      </figure>
    </div>

    <!-- 기존 첫 프로젝트는 아래로 이동 -->
    <figure class="work-unit">
      <div class="work-inner">
        <a href="perspective transition.html">
          <img src="7M4A2297-2-3.jpg" class="work">
        </a>
        <figcaption class="des">Perspective Transition</figcaption>
        <figcaption class="date">publication, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="fake-news.html">
          <img src="PU5A92361-11-min.png" class="work">
        </a>
        <figcaption class="des">Fake news on facebook</figcaption>
        <figcaption class="date">publication, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="the lovers.html">
          <img src="12-2.jpg" class="work">
        </a>
        <figcaption class="des">The Lovers</figcaption>
        <figcaption class="date">publication, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="Graphic scores.html">
          <img src="Untitled-1-10-min.png" class="work">
        </a>
        <figcaption class="des">Graphic Scores in the Library</figcaption>
        <figcaption class="date">publication, 2024</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner window-only">
        <div class="media-center">
          <a href="window.html">
            <img src="IMG_7321-4.jpg" class="work" alt="window still">
          </a>
        </div>
        <figcaption class="des">Raining</figcaption>
        <figcaption class="date">Installation, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner">
        <a href="video.html">
          <img src="IMG_7359-3-2-2.jpg" class="work">
        </a>
        <figcaption class="des">Navigation</figcaption>
        <figcaption class="date">video, 2025</figcaption>
      </div>
    </figure>

    <figure class="work-unit">
      <div class="work-inner window-only">
        <div class="media-center">
          <a href="meditation.html">
            <img src="meditation1.jpeg" class="work" alt="window still">
          </a>
        </div>
        <figcaption class="des">Meditation</figcaption>
        <figcaption class="date">video, 2025</figcaption>
      </div>
    </figure>
  </div>

  <script>
  window.addEventListener('DOMContentLoaded', () => {
    const units = document.querySelectorAll('.work-unit');
    const clickNote = document.getElementById('clickNote');
    const firstWorkImage = document.querySelector('.first-work-image');

    let noteDisabledByScroll = false;

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('reveal-visible');
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    units.forEach(unit => observer.observe(unit));

    if (firstWorkImage) {
      firstWorkImage.addEventListener('mouseenter', () => {
        if (!noteDisabledByScroll) {
          clickNote.classList.add('show');
          clickNote.classList.remove('hide');
        }
      });

      firstWorkImage.addEventListener('mouseleave', () => {
        if (!noteDisabledByScroll) {
          clickNote.classList.remove('show');
          clickNote.classList.add('hide');
        }
      });
    }

    window.addEventListener('scroll', () => {
      if (window.scrollY > 0) {
        noteDisabledByScroll = true;
        clickNote.classList.remove('show');
        clickNote.classList.add('hide');
      }
    }, { passive: true });
  });
  </script>

</body>
</html>
